<header tuiNavigationHeader>
  <tui-icon [routerLink]="['cabinet']" icon="@font.home" />
  <hr />
  <div tuiDropdownHover tuiAvatar="AI" [tuiDropdown]="dropdown"></div>
</header>
<ng-template #dropdown>
  <tui-data-list>
    <div class="header-dropdown__button">
      <a tuiOption [routerLink]="['/cabinet/event-list']" [queryParams]="{ drugType:'vaccine'}">
        Вакцинация
      </a>
      <button (click)="goCreationEventPage('vaccine')" type="button" iconEnd="@tui.circle-plus" tuiButton [size]="'l'" [appearance]="'flat'">
      </button>
    </div>
    <div class="header-dropdown__button">
      <a tuiOption [routerLink]="['/cabinet/event-list']" [queryParams]="{ drugType:'parasite'}">
        Таблетки от глистов
      </a>
      <button (click)="goCreationEventPage('parasite')" type="button" iconEnd="@tui.circle-plus" tuiButton [size]="'l'" [appearance]="'flat'">
      </button>
    </div>
    <div class="header-dropdown__button">
      <a tuiOption [routerLink]="['/cabinet/event-list']" [queryParams]="{ drugType:'ticks'}">
        Обработка от клещей
      </a>
      <button (click)="goCreationEventPage('ticks')" type="button" iconEnd="@tui.circle-plus" tuiButton [size]="'l'" [appearance]="'flat'">
      </button>
    </div>
  </tui-data-list>
</ng-template>
